components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # USER
    User:
      type: object
      required: [id, name, email, role, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          description: "super_admin | manager | employee | client"
        status:
          type: string
          description: "active | suspended"
        avatarUrl:
          type: ["string", "null"]
        projectsCount:
          type: ["integer", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
        avatarUrl:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        avatarUrl:
          type: string

    # CLIENT
    Client:
      type: object
      required: [id, name, email, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: ["string", "null"]
        email:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        gstNumber:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        status:
          type: string
          description: "active | inactive | prospect"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name, email, status]
      properties:
        name:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        gstNumber:
          type: string
        website:
          type: string
        industry:
          type: string
        status:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        gstNumber:
          type: string
        website:
          type: string
        industry:
          type: string
        status:
          type: string
        notes:
          type: string

    # LEAD
    Lead:
      type: object
      required: [id, name, email, stage, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: ["string", "null"]
        email:
          type: string
        phone:
          type: ["string", "null"]
        stage:
          type: string
          description: "new | contacted | interested | proposal_sent | negotiation | won | lost"
        notes:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        assigneeId:
          type: ["integer", "null"]
        assigneeName:
          type: ["string", "null"]
        value:
          type: ["number", "null"]
        createdAt:
          type: string

    LeadInput:
      type: object
      required: [name, email, stage]
      properties:
        name:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        stage:
          type: string
        notes:
          type: string
        followUpDate:
          type: string
        assigneeId:
          type: integer
        value:
          type: number

    LeadUpdate:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        email:
          type: string
        phone:
          type: string
        stage:
          type: string
